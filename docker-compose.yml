version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cloud_storage_db
    environment:
      POSTGRES_USER: clouduser
      POSTGRES_PASSWORD: cloudpassword
      POSTGRES_DB: cloud_storage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: cloud_storage_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/cloud_storage
      - SPRING_DATASOURCE_USERNAME=clouduser
      - SPRING_DATASOURCE_PASSWORD=cloudpassword
    depends_on:
      - db
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
